<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週期減脂健身日曆</title>
    <style>
        :root {
            --menstrual: #ff7675; --follicular: #55efc4; 
            --ovulation: #fdcb6e; --luteal: #74b9ff; --rest: #dfe6e9;
        }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #2d3436; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controls { text-align: center; margin-bottom: 25px; padding: 20px; border-bottom: 2px solid #eee; }
        input { padding: 10px; border-radius: 5px; border: 1px solid #ddd; margin: 10px 0; }
        button { background: #e84393; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 10px; 
            margin-top: 20px;
        }
        .weekday-header { text-align: center; font-weight: bold; padding: 10px; background: #eee; border-radius: 5px; }
        
        .day-cell { 
            min-height: 120px; border: 1px solid #eee; border-radius: 8px; padding: 8px;
            display: flex; flex-direction: column; transition: transform 0.2s; background: white;
        }
        .date-num { font-size: 0.8em; color: #636e72; margin-bottom: 5px; font-weight: bold; }
        .phase-tag { font-size: 0.7em; padding: 2px 5px; border-radius: 3px; color: white; width: fit-content; margin-bottom: 5px; }
        .workout-text { font-size: 0.85em; font-weight: 600; line-height: 1.3; }
        
        .bg-menstrual { background-color: var(--menstrual); }
        .bg-follicular { background-color: var(--follicular); }
        .bg-ovulation { background-color: var(--ovulation); }
        .bg-luteal { background-color: var(--luteal); }
        .bg-rest { background-color: #b2bec3; }
        .is-rest-day { background-color: #f9f9f9; border-style: dashed; }
        
        @media (max-width: 768px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
            .weekday-header { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>🔥 週期減脂健身日曆</h2>
        <p>週三、五休息 | 週末訓練 | 無氧+有氧結合</p>
        <label>選擇姨媽第一天：</label>
        <input type="date" id="cycleStart">
        <button onclick="buildCalendar()">生成減脂計劃</button>
    </div>

    <div class="calendar-grid" id="calendar">
        </div>
</div>

<script>
    function buildCalendar() {
        const startInput = document.getElementById('cycleStart').value;
        if (!startInput) return alert("請先選擇日期喔！");

        const startDate = new Date(startInput);
        const container = document.getElementById('calendar');
        container.innerHTML = '';

        const weekDays = ['週日', '週一', '週二', '週三', '週四', '週五', '週六'];
        weekDays.forEach(day => {
            const div = document.createElement('div');
            div.className = 'weekday-header';
            div.innerText = day;
            container.appendChild(div);
        });

        const firstDayOfWeek = startDate.getDay();
        for (let i = 0; i < firstDayOfWeek; i++) {
            container.appendChild(document.createElement('div'));
        }

        const weightWorkouts = ["🔥 Push + 15m有氧", "🔥 Pull + 15m有氧", "🔥 Leg + 15m有氧"];
        let weightIdx = 0;
        let lastWasWeight = false;

        for (let i = 1; i <= 28; i++) {
            const current = new Date(startDate);
            current.setDate(startDate.getDate() + (i - 1));
            const dayOfWeek = current.getDay();
            const dateStr = `${current.getMonth()+1}/${current.getDate()} (${weekDays[dayOfWeek]})`;
            
            let phase = "", bgColor = "", workout = "";

            if (i <= 5) { phase = "行經期"; bgColor = "bg-menstrual"; }
            else if (i <= 12) { phase = "濾泡期"; bgColor = "bg-follicular"; }
            else if (i <= 15) { phase = "排卵期"; bgColor = "bg-ovulation"; }
            else { phase = "黃體期"; bgColor = "bg-luteal"; }

            if (dayOfWeek === 3 || dayOfWeek === 5) {
                workout = "😴 休息日 (Recovery)";
                bgColor = "bg-rest";
                lastWasWeight = false;
            } else if (i <= 2) {
                workout = "🧘 完全休息 / 伸展";
                bgColor = "bg-rest";
                lastWasWeight = false;
            } else {
                if (phase === "濾泡期" || phase === "排卵期") {
                    if (!lastWasWeight) {
                        workout = weightWorkouts[weightIdx % 3];
                        weightIdx++;
                        lastWasWeight = true;
                    } else {
                        workout = "🏃 35min 快走/慢跑";
                        lastWasWeight = false;
                    }
                } else if (phase === "黃體期") {
                    if (!lastWasWeight) {
                        workout = "💪 輕量循環訓練";
                        lastWasWeight = true;
                    } else {
                        workout = "🚶 45min 穩態有氧";
                        lastWasWeight = false;
                    }
                } else {
                    workout = "🧘 瑜珈/快走 20min";
                    lastWasWeight = false;
                }
            }

            const cell = document.createElement('div');
            cell.className = `day-cell ${workout.includes("休息") ? 'is-rest-day' : ''}`;
            cell.innerHTML = `
                <div class="date-num">${dateStr}</div>
                <div class="phase-tag ${bgColor}">${phase} (D${i})</div>
                <div class="workout-text">${workout}</div>
            `;
            container.appendChild(cell);
        }
    }
</script>

</body>
</html>
